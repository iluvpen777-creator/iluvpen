version: '3.9'
services:
  postgres:
    image: postgres:16
    container_name: iluvpen-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: iluvpen
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - iluvpen_pgdata:/var/lib/postgresql/data
      - ./server/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

volumes:
  iluvpen_pgdata:
