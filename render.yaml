services:
  - type: web
    name: iluvpen-api
    runtime: node
    plan: starter
    buildCommand: npm ci
    startCommand: npm run db:migrate && npm run start:api
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: PGSSLMODE
        value: require
      - key: CORS_ORIGIN
        value: https://iluvpen777-creator.github.io,http://localhost:5173
      - key: DATABASE_URL
        fromDatabase:
          name: iluvpen-db
          property: connectionString

databases:
  - name: iluvpen-db
    plan: starter
